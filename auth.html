<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Triunfo • Acesso</title>

  <!-- Conexão com Supabase (caminho relativo + module) -->
  <script type="module" src="js/supabaseClient.js"></script>

  <style>
    :root{
      color-scheme: light dark;
      /* Paleta Triunfo */
      --bg-0: #0b0d12;
      --bg-1: #0f1115;
      --card: #101521;
      --card-2: #0e1522;
      --stroke: #1c2435;
      --muted: #9fb0c6;
      --text:  #eaf0f6;
      --brand: #E61414;      /* vermelho Triunfo (primário) */
      --brand-700:#c51212;
      --ok:    #0bb36b;      /* sucesso (secundário) */
      --ok-700:#089a5b;
      --shadow: 0 18px 48px rgba(0,0,0,.55);
      --radius: 16px;
    }

    html, body { height:100% }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--text);
      /* Fundo com “halo” no vermelho Triunfo */
      background:
        radial-gradient(42% 30% at 15% 10%, rgba(230,20,20,.14) 0%, rgba(230,20,20,0) 60%),
        radial-gradient(40% 32% at 85% 0%, rgba(255,255,255,.05) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 70%);
      display:flex; align-items:center; justify-content:center; padding:28px;
    }

    .shell{
      width:min(920px, 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    /* Filete superior na marca */
    .shell::before{
      content:"";
      position:absolute; left:0; top:0; right:0; height:4px;
      background: linear-gradient(90deg, var(--brand), #ff4343, var(--brand));
      opacity:.9;
    }

    .header{
      display:flex; align-items:center; justify-content:space-between;
      gap:16px; padding:22px 24px; background:rgba(255,255,255,.02);
      border-bottom:1px solid var(--stroke);
    }
    .brand{ display:flex; align-items:center; gap:14px; }
    .brand img{ width:40px; height:40px; border-radius:10px; object-fit:cover; }
    .title{ display:flex; gap:4px; flex-direction:column; }
    .title h1{ margin:0; font-size:18px; letter-spacing:.2px }
    .title small{ color:var(--muted) }

    .switch{ font-size:14px; color:var(--muted) }
    .switch a{
      color:#fff; text-underline-offset:3px; font-weight:700;
      padding:6px 10px; border-radius:8px; transition:.15s;
    }
    .switch a:hover{ background:rgba(230,20,20,.12); color:#fff }

    .content{ padding:24px; }

    .panel{
      background:var(--card-2);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:20px;
      max-width:640px;
      margin-inline:auto;
    }
    .panel h2{ margin:0 0 14px 0; font-size:18px; letter-spacing:.2px }
    label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 6px }
    input{
      width:100%; padding:12px 13px; border-radius:10px;
      border:1px solid #26324a; background:#0f1626; color:var(--text);
      outline:none; transition:.18s;
    }
    input::placeholder{ color:#6f819b }
    input:focus{ border-color:#3d74ff; box-shadow:0 0 0 3px rgba(61,116,255,.22) }
    .row{ display:grid; gap:10px }
    .actions{ display:flex; gap:12px; align-items:center; margin-top:14px; flex-wrap:wrap }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      border:0; border-radius:12px; padding:12px 18px; cursor:pointer;
      font-weight:700; letter-spacing:.2px; transition:.15s;
    }
    .btn-primary{ background:var(--brand); color:#fff }
    .btn-primary:hover{ background:var(--brand-700) }
    .btn-ghost{ background:transparent; color:var(--muted); border:1px solid var(--stroke) }
    .btn[disabled]{ opacity:.55; cursor:not-allowed }

    .hint{ color:var(--muted); font-size:12px; }
    .error{ background:#2a1216; border:1px solid #5c1b21; color:#ffc7c7;
            padding:10px 12px; border-radius:10px; margin-top:10px; display:none }
    .success{ background:#0f251d; border:1px solid #1c5a44; color:#aef0ce;
              padding:10px 12px; border-radius:10px; margin-top:10px; display:none }

    .hidden{ display:none }
    @media (max-width: 560px){
      .header{ align-items:flex-start }
      .title h1{ font-size:16px }
    }
  </style>
</head>
<body>
  <div class="shell" role="dialog" aria-labelledby="titulo">
    <div class="header">
      <div class="brand">
        <img src="logo.jpeg" alt="Viação Triunfo">
        <div class="title">
          <h1 id="titulo">Triunfo • Acesso</h1>
          <small>Nome + Senha (sem e‑mail)</small>
        </div>
      </div>

      <!-- Link para alternar -->
      <div class="switch">
        <span id="switchText">Já tem conta?</span>
        <a id="toggleLink" href="#entrar" aria-controls="form-login">Entrar</a>
      </div>
    </div>

    <div class="content">
      <!-- CADASTRO (padrão visível) -->
      <form id="form-cadastro" class="panel" autocomplete="off">
        <h2>Cadastro de Motorista</h2>

        <div class="row">
          <label for="su_nome">Nome</label>
          <input id="su_nome" type="text" placeholder="Ex.: João da Silva" required />
        </div>

        <div class="row">
          <label for="su_senha">Senha (mín. 6)</label>
          <input id="su_senha" type="password" minlength="6" placeholder="Sua senha" required />
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit" id="btnCriar">Criar conta</button>
          <span class="hint">Geramos um e‑mail técnico <code>nome@drivers.local</code> apenas para autenticar.</span>
        </div>

        <div class="error" id="cad-erro"></div>
        <div class="success" id="cad-ok"></div>
      </form>

      <!-- LOGIN (inicialmente oculto) -->
      <form id="form-login" class="panel hidden" autocomplete="off" aria-hidden="true">
        <h2>Entrar</h2>

        <div class="row">
          <label for="si_nome">Nome</label>
          <input id="si_nome" type="text" placeholder="Ex.: João da Silva"/>
        </div>

        <div class="row">
          <label for="si_senha">Senha</label>
          <input id="si_senha" type="password" minlength="6" placeholder="Sua senha"/>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit" id="btnEntrar">Entrar</button>
          <button class="btn btn-ghost" type="button" id="btnVoltarCadastro">← Voltar ao cadastro</button>
        </div>

        <div class="error" id="log-erro"></div>
      </form>
    </div>
  </div>

  <script type="module">
    // ---------- Utilitários ----------
    const FAKE_DOMAIN = "drivers.local";
    const el = (id) => document.getElementById(id);

    function slugifyName(name){
      const s = name
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // remove acentos
        .trim().toLowerCase()
        .replace(/[^a-z0-9 ]/g,'')                        // remove símbolos
        .replace(/\s+/g,'.');                             // espaços -> ponto
      return s || `motorista.${Math.floor(Math.random()*1e6)}`;
    }
    const nameToEmail = (name) => `${slugifyName(name)}@${FAKE_DOMAIN}`;

    function setView(view){  // 'cadastro' | 'login'
      const isLogin = view === 'login';
      el('form-cadastro').classList.toggle('hidden', isLogin);
      el('form-login').classList.toggle('hidden', !isLogin);
      el('form-login').setAttribute('aria-hidden', (!isLogin).toString());
      if (isLogin){
        el('switchText').textContent = 'Ainda não tem conta?';
        el('toggleLink').textContent = 'Cadastrar';
        el('toggleLink').setAttribute('href', '#cadastrar');
        el('toggleLink').setAttribute('aria-controls','form-cadastro');
      } else {
        el('switchText').textContent = 'Já tem conta?';
        el('toggleLink').textContent = 'Entrar';
        el('toggleLink').setAttribute('href', '#entrar');
        el('toggleLink').setAttribute('aria-controls','form-login');
      }
      // limpar mensagens
      ['cad-erro','cad-ok','log-erro'].forEach(id => { const n=el(id); if(n){n.style.display='none'; n.textContent='';} });
    }

    // Alternância via link
    el('toggleLink').addEventListener('click', (e)=>{
      e.preventDefault();
      const toLogin = !el('form-login').classList.contains('hidden');
      setView(toLogin ? 'cadastro' : 'login');
    });
    el('btnVoltarCadastro').addEventListener('click', ()=> setView('cadastro'));

    // Garante Supabase carregado
    if (!window.supabase) {
      alert("Falha ao carregar o Supabase. Verifique js/supabaseClient.js");
      throw new Error("Supabase client ausente");
    }

    // ---------- Cadastro (Nome + Senha >= 6) ----------
    el('form-cadastro').addEventListener('submit', async (e)=>{
      e.preventDefault();
      el('cad-erro').style.display='none';
      el('cad-ok').style.display='none';

      const nome  = el('su_nome').value.trim();
      const senha = el('su_senha').value;
      if (nome.length < 2){ el('cad-erro').textContent='Informe um nome válido.'; el('cad-erro').style.display='block'; return; }
      if (senha.length < 6){ el('cad-erro').textContent='A senha deve ter pelo menos 6 caracteres.'; el('cad-erro').style.display='block'; return; }

      const btn = el('btnCriar'); btn.disabled = true; btn.textContent = 'Criando…';

      let email = nameToEmail(nome);
      let tentativas = 0, criado = false, ultimoErro = null;

      while (!criado && tentativas < 3) {
        const { data, error } = await supabase.auth.signUp({ email, password: senha });
        if (!error) {
          const user = data.user;
          const { error: pErr } = await supabase.from('profiles').insert({
            user_id: user.id, role: 'driver', full_name: nome
          });
          if (pErr) { ultimoErro = pErr; break; }
          el('cad-ok').textContent = 'Conta criada! Clique em “Entrar” para acessar.';
          el('cad-ok').style.display='block';
          criado = true;
          setView('login');
        } else if ((error.message||'').toLowerCase().includes('already')) {
          tentativas++; email = nameToEmail(`${nome} ${tentativas+1}`);
          ultimoErro = error;
        } else {
          ultimoErro = error; break;
        }
      }

      if (!criado && ultimoErro){
        el('cad-erro').textContent = `Não foi possível criar a conta: ${ultimoErro.message || ultimoErro}`;
        el('cad-erro').style.display='block';
      }
      btn.disabled = false; btn.textContent = 'Criar conta';
    });

    // ---------- Login ----------
    el('form-login').addEventListener('submit', async (e)=>{
      e.preventDefault();
      el('log-erro').style.display='none';

      const nome  = el('si_nome').value.trim();
      const senha = el('si_senha').value;
      if (!nome || senha.length < 6){
        el('log-erro').textContent = 'Informe um nome e uma senha com pelo menos 6 caracteres.';
        el('log-erro').style.display='block'; return;
      }

      const btn = el('btnEntrar'); btn.disabled = true; btn.textContent = 'Entrando…';

      const email = nameToEmail(nome);
      const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
      if (error){
        el('log-erro').textContent = error.message || 'Erro no login.';
        el('log-erro').style.display='block';
        btn.disabled = false; btn.textContent = 'Entrar';
        return;
      }

      // sucesso
      window.location.href = "/";
    });

    // Inicia na tela de CADASTRO
    setView('cadastro');
  </script>
</body>
</html>
