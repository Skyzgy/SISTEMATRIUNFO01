<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Triunfo • Acesso</title>

  <meta name="color-scheme" content="dark light"/>
  <meta name="theme-color" content="#0c0f15"/>

  <style>
    :root{
      --brand: #E61414;
      --brand-600:#cf1313;
      --bg: #0b0e14;
      --ink:#eef3ff;
      --muted:#9aa8c3;
      --line: rgba(255,255,255,.08);
      --t: .22s ease;
    }

    *,*::before,*::after{ box-sizing:border-box }
    html, body { height:100%; margin:0 }
    
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(50% 40% at 15% 0%, rgba(230,20,20,.20) 0%, rgba(230,20,20,0) 60%),
        radial-gradient(40% 32% at 85% -8%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, #0a0d13 0%, #0b0e14 100%);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .auth-container{
      width:100%;
      max-width:500px;
      text-align:center;
    }

    .logo-section{
      margin-bottom:50px;
    }

    .logo-title{
      margin:0 0 8px 0;
      font-size:32px;
      font-weight:900;
      letter-spacing:-0.5px;
    }

    .logo-subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
      font-style:italic;
    }

    .tab-navigation{
      display:flex;
      gap:15px;
      margin-bottom:30px;
      border-bottom:2px solid var(--line);
      padding-bottom:15px;
    }

    .tab-btn{
      flex:1;
      background:none;
      border:none;
      color:var(--muted);
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      padding:10px;
      border-bottom:3px solid transparent;
      transition:var(--t);
      position:relative;
      bottom:-17px;
    }

    .tab-btn.active{
      color:var(--ink);
      border-bottom-color:var(--brand);
    }

    .tab-btn:hover{
      color:var(--ink);
    }

    .form-section{
      background: rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:18px;
      padding:40px 30px;
      backdrop-filter: blur(8px);
      min-height:350px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .form-title{
      margin:0 0 30px 0;
      font-size:24px;
      font-weight:700;
      letter-spacing:1px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:20px;
      text-align:left;
    }

    label{
      font-size:14px;
      color:var(--ink);
      font-weight:600;
    }

    input{
      width:100%;
      padding:16px;
      border-radius:14px;
      border:2px solid rgba(230,20,20,.5);
      background:rgba(0,0,0,.35);
      color:var(--ink);
      font-size:16px;
      transition:var(--t);
    }

    input::placeholder{
      color:rgba(157,170,195,.6);
    }

    input:focus{
      outline:none;
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(230,20,20,.25);
    }

    .forgot-password{
      text-align:center;
      margin:20px 0;
    }

    .forgot-password a{
      color:var(--brand);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      transition:var(--t);
    }

    .forgot-password a:hover{
      opacity:0.8;
    }

    .signup-link{
      margin-top:20px;
      font-size:14px;
      color:var(--muted);
    }

    .signup-link a{
      color:var(--brand);
      text-decoration:none;
      font-weight:600;
      cursor:pointer;
      transition:var(--t);
    }

    .signup-link a:hover{
      opacity:0.8;
    }

    .btn-submit{
      width:100%;
      padding:16px;
      background:var(--brand);
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      letter-spacing:0.5px;
      cursor:pointer;
      transition:var(--t);
      margin-top:20px;
    }

    .btn-submit:hover{
      background:var(--brand-600);
    }

    .btn-submit:disabled{
      background:#666;
      cursor:not-allowed;
    }

    .success{
      display:none;
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      font-size:14px;
      background:#0f251d;
      border:1px solid #1c5a44;
      color:#baf3d2;
    }

    .error{
      display:none;
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      font-size:14px;
      background:#3a1216;
      border:1px solid #6a1e25;
      color:#ffc7c7;
    }

    .hidden{ display:none !important }
  </style>
</head>

<body>

  <div class="auth-container">

    <!-- Logo e Título -->
    <div class="logo-section">
      <h1 class="logo-title">Viação Triunfo</h1>
      <p class="logo-subtitle">Sistema de Gestão</p>
    </div>

    <!-- Abas de Navegação -->
    <div class="tab-navigation">
      <button class="tab-btn active" id="tabLogin" onclick="showLogin()">Login</button>
      <button class="tab-btn" id="tabCadastro" onclick="showCadastro()">Cadastro</button>
    </div>

    <!-- Formulário de LOGIN -->
    <div id="loginForm" class="form-section">
      <h2 class="form-title">LOGIN</h2>

      <form id="form-login" onsubmit="handleLogin(event)">
        
        <div class="form-group">
          <label for="login_nome">Nome e Sobrenome</label>
          <input 
            id="login_nome" 
            type="text" 
            placeholder="Insira seu nome completo"
            required
          />
        </div>

        <div class="form-group">
          <label for="login_senha">Senha</label>
          <input 
            id="login_senha" 
            type="password" 
            placeholder="6 dígitos numéricos"
            maxlength="6"
            required
          />
        </div>

        <div class="forgot-password">
          <a href="#esqueci">Esqueci minha senha</a>
        </div>

        <div id="login-erro" class="error"></div>
        <div id="login-sucesso" class="success"></div>

        <button type="submit" class="btn-submit" id="btnLogin">ENTRAR</button>

        <div class="signup-link">
          Sem login? <a onclick="showCadastro()">Faça seu cadastro</a>
        </div>

      </form>
    </div>

    <!-- Formulário de CADASTRO -->
    <div id="cadastroForm" class="form-section hidden">
      <h2 class="form-title">CADASTRO</h2>

      <form id="form-cadastro" onsubmit="handleCadastro(event)">
        
        <div class="form-group">
          <label for="cadastro_nome">Nome e Sobrenome</label>
          <input 
            id="cadastro_nome" 
            type="text" 
            placeholder="Insira seu nome completo"
            required
          />
        </div>

        <div class="form-group">
          <label for="cadastro_senha">Senha (6 dígitos numéricos)</label>
          <input 
            id="cadastro_senha" 
            type="password" 
            placeholder="Ex.: 123456"
            maxlength="6"
            required
          />
        </div>

        <div class="form-group">
          <label for="cadastro_confirma">Confirmar Senha</label>
          <input 
            id="cadastro_confirma" 
            type="password" 
            placeholder="Confirme sua senha"
            maxlength="6"
            required
          />
        </div>

        <div id="cadastro-erro" class="error"></div>
        <div id="cadastro-sucesso" class="success"></div>

        <button type="submit" class="btn-submit" id="btnCadastro">CRIAR CONTA</button>

        <div class="signup-link">
          Já tem conta? <a onclick="showLogin()">Faça login</a>
        </div>

      </form>
    </div>

  </div>

  <script>
    // ============ FUNÇÕES AUXILIARES ============
    function showLogin() {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('cadastroForm').classList.add('hidden');
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabCadastro').classList.remove('active');
      limparMensagens();
    }

    function showCadastro() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('cadastroForm').classList.remove('hidden');
      document.getElementById('tabLogin').classList.remove('active');
      document.getElementById('tabCadastro').classList.add('active');
      limparMensagens();
    }

    function limparMensagens() {
      document.querySelectorAll('.error, .success').forEach(el => {
        el.style.display = 'none';
      });
    }

    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function showSuccess(elementId, message) {
      const successEl = document.getElementById(elementId);
      successEl.textContent = message;
      successEl.style.display = 'block';
    }

    // Divide "João da Silva" em { firstName, lastName }
    function splitFullName(fullName) {
      const parts = fullName.trim().split(/\s+/);
      if (parts.length < 2) return null;
      
      const firstName = parts[0];
      const lastName = parts.slice(1).join(' ');
      return { firstName, lastName };
    }

    // Valida se é 6 dígitos numéricos
    function isSixDigitPassword(password) {
      return /^\d{6}$/.test(password);
    }

    // ============ HANDLERS DE FORMULÁRIO ============
    async function handleLogin(event) {
      event.preventDefault();
      
      const nomeCompleto = document.getElementById('login_nome').value.trim();
      const senha = document.getElementById('login_senha').value.trim();
      const btnSubmit = document.getElementById('btnLogin');

      // Validar nome
      const names = splitFullName(nomeCompleto);
      if (!names) {
        showError('login-erro', 'Informe nome completo (nome e sobrenome).');
        return;
      }

      // Validar senha
      if (!isSixDigitPassword(senha)) {
        showError('login-erro', 'Senha inválida. Use 6 dígitos numéricos.');
        return;
      }

      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Entrando...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({
            firstName: names.firstName,
            lastName: names.lastName,
            password: senha
          })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess('login-sucesso', data.message || 'Login realizado com sucesso!');
          
          // Redirecionar após 2 segundos
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          showError('login-erro', data.error || 'Erro ao fazer login');
        }
      } catch (error) {
        console.error('Erro:', error);
        showError('login-erro', 'Erro de conexão com o servidor');
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'ENTRAR';
      }
    }

    async function handleCadastro(event) {
      event.preventDefault();
      
      const nomeCompleto = document.getElementById('cadastro_nome').value.trim();
      const senha = document.getElementById('cadastro_senha').value.trim();
      const confirma = document.getElementById('cadastro_confirma').value.trim();
      const btnSubmit = document.getElementById('btnCadastro');

      // Validar nome
      const names = splitFullName(nomeCompleto);
      if (!names) {
        showError('cadastro-erro', 'Informe nome completo (nome e sobrenome).');
        return;
      }

      // Validar senha
      if (!isSixDigitPassword(senha)) {
        showError('cadastro-erro', 'Senha deve ter exatamente 6 dígitos numéricos.');
        return;
      }

      // Validar confirmação
      if (senha !== confirma) {
        showError('cadastro-erro', 'As senhas não coincidem.');
        return;
      }

      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Criando conta...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({
            firstName: names.firstName,
            lastName: names.lastName,
            password: senha
          })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess('cadastro-sucesso', data.message || 'Conta criada com sucesso!');
          
          // Fazer login automático
          setTimeout(async () => {
            try {
              const loginResponse = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                credentials: 'include',
                body: JSON.stringify({
                  firstName: names.firstName,
                  lastName: names.lastName,
                  password: senha
                })
              });

              if (loginResponse.ok) {
                window.location.href = '/';
              } else {
                showLogin();
              }
            } catch (e) {
              showLogin();
            }
          }, 1500);
        } else {
          showError('cadastro-erro', data.error || 'Erro ao criar conta');
        }
      } catch (error) {
        console.error('Erro:', error);
        showError('cadastro-erro', 'Erro de conexão com o servidor');
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'CRIAR CONTA';
      }
    }
  </script>
</body>
</html>
