<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Triunfo • Acesso</title>

  <meta name="color-scheme" content="dark light"/>
  <meta name="theme-color" content="#0c0f15"/>

  <style>
    :root{
      --brand: #E61414;
      --brand-600:#cf1313;
      --bg: #0b0e14;
      --ink:#eef3ff;
      --muted:#9aa8c3;
      --line: rgba(255,255,255,.08);
      --t: .22s ease;
    }

    *,*::before,*::after{ box-sizing:border-box }
    html, body { height:100%; margin:0 }
    
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(50% 40% at 15% 0%, rgba(230,20,20,.20) 0%, rgba(230,20,20,0) 60%),
        radial-gradient(40% 32% at 85% -8%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, #0a0d13 0%, #0b0e14 100%);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .auth-container{
      width:100%;
      max-width:500px;
      text-align:center;
    }

    .logo-section{
      margin-bottom:50px;
    }

    .logo-title{
      margin:0 0 8px 0;
      font-size:32px;
      font-weight:900;
      letter-spacing:-0.5px;
    }

    .logo-subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
      font-style:italic;
    }

    .form-section{
      background: rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:18px;
      padding:40px 30px;
      backdrop-filter: blur(8px);
    }

    .form-title{
      margin:0 0 30px 0;
      font-size:24px;
      font-weight:700;
      letter-spacing:1px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:24px;
      text-align:left;
    }

    label{
      font-size:14px;
      color:var(--ink);
      font-weight:600;
    }

    input{
      width:100%;
      padding:16px;
      border-radius:14px;
      border:2px solid rgba(230,20,20,.5);
      background:rgba(0,0,0,.35);
      color:var(--ink);
      font-size:16px;
      transition:var(--t);
    }

    input::placeholder{
      color:rgba(157,170,195,.6);
    }

    input:focus{
      outline:none;
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(230,20,20,.25);
    }

    .error-message{
      font-size:12px;
      color:#ff6b6b;
      margin-top:4px;
      display:none;
    }

    .forgot-password{
      text-align:center;
      margin:20px 0;
    }

    .forgot-password a{
      color:var(--brand);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      transition:var(--t);
    }

    .forgot-password a:hover{
      opacity:0.8;
    }

    .btn-login{
      width:100%;
      padding:16px;
      background:var(--brand);
      color:#fff;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      letter-spacing:0.5px;
      cursor:pointer;
      transition:var(--t);
      margin-top:20px;
    }

    .btn-login:hover{
      background:var(--brand-600);
    }

    .success{
      display:none;
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      font-size:14px;
      background:#0f251d;
      border:1px solid #1c5a44;
      color:#baf3d2;
    }

    .hidden{ display:none !important }
  </style>
</head>

<body>

  <div class="auth-container">

    <!-- Logo e Título -->
    <div class="logo-section">
      <h1 class="logo-title">Viação Triunfo</h1>
      <p class="logo-subtitle">Sistema de Gestão</p>
    </div>

    <!-- Formulário -->
    <div class="form-section">
      <h2 class="form-title">LOGIN</h2>

      <form id="form-login">
        
        <div class="form-group">
          <label for="nome">Nome e Sobrenome</label>
          <input 
            id="nome" 
            type="text" 
            placeholder="Insira seu nome completo"
            required
          />
          <div class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input 
            id="senha" 
            type="password" 
            placeholder="Insira sua senha"
            required
          />
          <div class="error-message"></div>
        </div>

        <div class="forgot-password">
          <a href="#esqueci">Esqueci minha senha</a>
        </div>

        <div id="msg-sucesso" class="success"></div>

        <button type="submit" class="btn-login">ENTRAR</button>

      </form>
    </div>

  </div>

  <script type="module" src="/js/auth-page.js"></script>
</body>
</html>
