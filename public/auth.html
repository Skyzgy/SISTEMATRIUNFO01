<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Triunfo • Acesso</title>

  <style>
    :root {
      --brand:#E61414;
      --brand-hover:#c51212;
      --text:#f3f6ff;
      --muted:#9eaac0;
      --bg:#0b0d13;
      --panel:#11141b;
      --glass:rgba(255,255,255,0.06);
      --radius:18px;
      --transition:.25s ease;
    }

    html, body { height: 100%; margin: 0; font-family: "Inter", system-ui, sans-serif; }

    body {
      background: radial-gradient(circle at 30% 20%, rgba(230,20,20,.20), transparent 50%),
                  radial-gradient(circle at 80% 0%, rgba(255,255,255,.06), transparent 65%),
                  linear-gradient(180deg, #0b0d13, #0f1117 68%);
      color: var(--text);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      padding: 40px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: min(950px, 100%);
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 14px 42px rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      animation: fadeSlide .8s ease forwards;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shell::before {
      content:"";
      position:absolute;
      top:0; left:0; right:0;
      height:6px;
      background: linear-gradient(90deg, #ff2a2a, #E61414, #ff4343);
    }

    .header {
      padding: 26px 32px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,.02);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    h1 {
      margin:0;
      font-size: 22px;
      letter-spacing:.4px;
      font-weight: 700;
    }

    .switch {
      display:flex;
      align-items:center;
      gap:10px;
      font-size:15px;
      color:var(--muted);
    }

    .switch-link {
      color:#fff;
      padding:8px 14px;
      border-radius:12px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.03);
      text-decoration: none;
      cursor:pointer;
      transition: var(--transition);
      font-weight: 600;
    }
    .switch-link:hover {
      background: rgba(230,20,20,.22);
      border-color: var(--brand);
    }

    .content { padding: 36px; }

    .panel {
      width:100%;
      max-width:540px;
      margin:0 auto;
      background: rgba(255,255,255,.03);
      padding:32px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      animation: fadeSlide .6s ease forwards;
    }

    .panel h2 {
      margin:0 0 20px;
      font-size:20px;
      font-weight:600;
      letter-spacing:.3px;
    }

    label {
      display:block;
      margin: 14px 0 6px;
      color:var(--muted);
      font-size:14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(0,0,0,.35);
      color: var(--text);
      font-size:15px;
      outline:none;
      transition: var(--transition);
    }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(230,20,20,.25);
      background: rgba(0,0,0,.45);
    }

    .actions {
      display:flex;
      gap:14px;
      margin-top:22px;
      flex-wrap:wrap;
    }

    .btn {
      padding:14px 22px;
      border-radius:14px;
      cursor:pointer;
      border:0;
      font-weight:700;
      letter-spacing:.3px;
      transition: var(--transition);
      font-size:15px;
    }

    .btn-brand {
      background: var(--brand);
      color:#fff;
    }
    .btn-brand:hover {
      background: var(--brand-hover);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,.14);
      color: var(--muted);
    }

    .error, .success {
      margin-top:18px;
      padding:14px 16px;
      border-radius:12px;
      display:none;
      font-size:14px;
    }

    .error {
      background:#3a1216;
      border:1px solid #652027;
      color:#ffb3b3;
    }

    .success {
      background:#0f2a20;
      border:1px solid #1f6144;
      color:#c0f2d5;
    }

    .hidden { display:none !important; }

    @media(max-width:620px){
      .content { padding:22px }
      .panel { padding:24px }
      h1 { font-size:19px }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="shell" role="dialog">

    <div class="header">
      <h1>Triunfo • Acesso</h1>
      <div class="switch">
        <span id="switchText">Já tem conta?</span>
        <a id="toggleLink" class="switch-link" href="#entrar">Entrar</a>
      </div>
    </div>

    <div class="content">

      <!-- CADASTRO -->
      <form id="form-cadastro" class="panel" autocomplete="off">
        <h2>Cadastro de Motorista</h2>

        <label for="su_nome">Nome</label>
        <input id="su_nome" type="text" placeholder="Ex.: João da Silva" required />

        <label for="su_senha">Senha (mín. 6)</label>
        <input id="su_senha" type="password" minlength="6" required />

        <div class="actions">
          <button class="btn btn-brand" id="btnCriar">Criar conta</button>
        </div>

        <div class="error" id="cad-erro"></div>
        <div class="success" id="cad-ok"></div>
      </form>

      <!-- LOGIN -->
      <form id="form-login" class="panel hidden" autocomplete="off">
        <h2>Entrar</h2>

        <label for="si_nome">Nome</label>
        <input id="si_nome" type="text" placeholder="Ex.: João da Silva"/>

        <label for="si_senha">Senha</label>
        <input id="si_senha" type="password" minlength="6"/>

        <div class="actions">
          <button class="btn btn-brand" id="btnEntrar">Entrar</button>
          <button class="btn btn-ghost" type="button" id="btnVoltarCadastro">← Voltar</button>
        </div>

        <div class="error" id="log-erro"></div>
      </form>
    </div>
  </div>
</div>

<script type="module" src="/js/auth-page.js"></script>
</body>
</html>
